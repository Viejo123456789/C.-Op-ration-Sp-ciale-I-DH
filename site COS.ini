<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système de Gestion Militaire - V3.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* ── VARIABLES ─────────────────────────────────────── */
        :root {
            --green:  #4CAF50;
            --green2: #45a049;
            --orange: #ff9800;
            --red:    #f44336;
            --blue:   #2196F3;
            --bg:     #111;
            --bg2:    #1a1a1a;
            --bg3:    #252525;
            --bg4:    #2d2d2d;
            --border: #333;
            --text:   #e0e0e0;
            --muted:  #888;
            --font-head: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --alert-color: var(--green);
        }

        /* ── RESET ─────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-head);
            overflow: hidden;
        }

        body.logged-out { display: flex; justify-content: center; align-items: center; }
        body.logged-in  { display: block; }

        /* ── AUTH ──────────────────────────────────────────── */
        #auth-section {
            background: var(--bg4);
            padding: 2.5rem 2rem;
            border-radius: 6px;
            box-shadow: 0 0 40px rgba(76,175,80,.15), 0 4px 20px rgba(0,0,0,.6);
            width: 340px;
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid #2a2a2a;
            position: relative;
            overflow: hidden;
        }

        /* Scan-line animation */
        #auth-section::before {
            content: '';
            position: absolute; top: -100%; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(transparent, rgba(76,175,80,.5), transparent);
            animation: scan 2.5s linear infinite;
        }
        @keyframes scan { to { top: 200%; } }

        .auth-logo {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--green);
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
            opacity: .7;
            white-space: pre;
            line-height: 1.3;
            text-align: center;
        }

        #auth-section h2 {
            font-family: var(--font-head);
            color: var(--green);
            letter-spacing: 4px;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            width: 100%;
            text-align: center;
        }

        .auth-input {
            width: 100%; padding: 11px 14px;
            margin-bottom: 10px;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            background: var(--bg2);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-align: center;
            letter-spacing: 2px;
            transition: border-color .2s;
        }
        .auth-input:focus { outline: none; border-color: var(--green); }
        .auth-input::placeholder { opacity: .4; letter-spacing: 1px; }

        /* ── BUTTONS ───────────────────────────────────────── */
        button {
            width: 100%; padding: 10px;
            background: var(--green); border: none;
            color: white; font-family: var(--font-head);
            font-size: 0.85rem; font-weight: 700;
            letter-spacing: 2px; cursor: pointer;
            border-radius: 4px; transition: background .2s, box-shadow .2s;
        }
        button:hover { background: var(--green2); box-shadow: 0 0 12px rgba(76,175,80,.4); }

        .btn-sm { width: auto; padding: 4px 10px; font-size: 0.65rem; letter-spacing: 1px; }
        .btn-blue   { background: var(--blue); }
        .btn-blue:hover   { background: #1a7fcc; box-shadow: 0 0 12px rgba(33,150,243,.4); }
        .btn-red    { background: var(--red); }
        .btn-red:hover    { background: #c62828; box-shadow: 0 0 12px rgba(244,67,54,.4); }
        .btn-orange { background: var(--orange); }
        .btn-orange:hover { background: #e68900; box-shadow: 0 0 12px rgba(255,152,0,.4); }
        .btn-muted  { background: #444; }
        .btn-muted:hover  { background: #555; box-shadow: none; }

        /* ── DASHBOARD ─────────────────────────────────────── */
        #dashboard {
            display: none; flex-direction: column;
            width: 100%; height: 100vh;
        }

        /* ── NAVBAR ────────────────────────────────────────── */
        .navbar {
            background: var(--bg4);
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
            padding: 12px 160px 12px 20px;
            border-bottom: 2px solid var(--alert-color);
            flex-shrink: 0; position: relative;
            transition: border-color .4s;
        }

        .nav-item {
            padding: 7px 14px;
            background: #3a3a3a;
            border-radius: 4px; cursor: pointer;
            font-weight: 600; font-size: 0.75rem;
            letter-spacing: 1.5px; text-transform: uppercase;
            transition: background .2s, color .2s;
            border: 1px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--green);
            color: #000; border-color: transparent;
        }

        .alert-controls {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%);
            display: flex; align-items: center; gap: 4px;
        }
        .alert-label {
            font-size: 0.6rem; letter-spacing: 1px;
            color: var(--muted); margin-right: 4px;
            font-family: var(--font-mono);
        }
        .alert-btn {
            width: auto; padding: 4px 9px;
            font-size: 0.6rem; letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,.15);
        }
        .btn-l1 { background: var(--green); }
        .btn-l1:hover { background: var(--green2); }
        .btn-l2 { background: var(--orange); }
        .btn-l2:hover { background: #e68900; }
        .btn-l3 { background: var(--red); }
        .btn-l3:hover { background: #c62828; }

        /* ── STATUS BANNER ─────────────────────────────────── */
        #status-banner {
            display: none;
            background: var(--red); color: white;
            padding: 6px; font-size: 0.8rem; font-weight: 700;
            text-align: center; letter-spacing: 3px;
            animation: blink 1s ease-in-out infinite;
            font-family: var(--font-mono);
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

        /* ── LAYOUT ────────────────────────────────────────── */
        .main-layout {
            display: flex; flex-grow: 1; overflow: hidden;
        }

        /* ── SIDEBAR ───────────────────────────────────────── */
        .sidebar {
            width: 210px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            padding: 15px; flex-shrink: 0;
        }
        .sidebar-title {
            font-size: 0.7rem; color: var(--green);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 2px solid var(--green);
            font-family: var(--font-mono);
        }
        .user-list { list-style: none; overflow-y: auto; flex-grow: 1; }
        .user-item {
            display: flex; align-items: center;
            padding: 7px 8px; margin-bottom: 4px;
            background: rgba(255,255,255,.04);
            border-radius: 3px; font-size: 0.8rem;
            border: 1px solid transparent;
        }
        .user-item:hover { border-color: var(--border); }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            margin-right: 10px; background: var(--green);
            box-shadow: 0 0 6px var(--green); flex-shrink: 0;
        }

        /* ── MAIN CONTENT ──────────────────────────────────── */
        .main-container {
            flex-grow: 1; display: flex; flex-direction: column;
            padding: 24px; overflow-y: auto;
        }
        .page { display: none; width: 100%; }

        /* ── CARDS ─────────────────────────────────────────── */
        .op-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-top: 2px solid var(--green);
            padding: 20px; border-radius: 6px;
            margin: 16px auto; max-width: 620px;
            text-align: left;
        }
        .op-card h3 {
            font-size: 0.85rem; letter-spacing: 2px;
            color: var(--muted); text-transform: uppercase;
            margin-bottom: 16px; font-family: var(--font-mono);
        }

        .field-label {
            display: block; color: var(--green);
            font-size: 0.65rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 4px; margin-top: 12px;
        }
        .field-label:first-child { margin-top: 0; }

        .op-input, .rs-input, .zd-input {
            width: 100%; background: var(--bg2);
            border: 1px solid #3a3a3a; color: var(--orange);
            padding: 8px 10px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 0.85rem;
            transition: border-color .2s; resize: none;
        }
        .op-input:focus, .rs-input:focus, .zd-input:focus {
            outline: none; border-color: var(--green);
        }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* ── ENTRIES ───────────────────────────────────────── */
        .history-container {
            margin-top: 20px; padding-top: 20px;
            border-top: 1px solid var(--border); text-align: left;
        }
        .history-container h3 {
            color: var(--green); font-size: 0.9rem;
            letter-spacing: 2px; margin-bottom: 12px;
            text-transform: uppercase; font-family: var(--font-mono);
        }

        .entry-card {
            background: rgba(255,255,255,.04);
            border: 1px solid var(--border);
            border-left: 3px solid var(--green);
            padding: 12px; margin-bottom: 10px;
            border-radius: 0 4px 4px 0; font-size: 0.85rem;
        }
        .entry-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 8px;
        }
        .entry-name { color: var(--green); font-weight: 700; letter-spacing: 1px; }
        .entry-body { display: flex; gap: 14px; }
        .entry-photo {
            max-width: 90px; max-height: 90px;
            border: 1px solid var(--border); border-radius: 3px; object-fit: cover;
        }
        .entry-desc { font-style: italic; color: var(--muted); margin-top: 4px; }

        /* Danger badge */
        .danger-badge {
            display: inline-block; padding: 2px 8px;
            border-radius: 3px; font-family: var(--font-mono);
            font-size: 0.8rem; font-weight: 700;
        }
        .danger-low    { background: rgba(76,175,80,.2);  color: var(--green); }
        .danger-medium { background: rgba(255,152,0,.2);  color: var(--orange); }
        .danger-high   { background: rgba(244,67,54,.2);  color: var(--red); }

        /* ── TEAM SECTION ──────────────────────────────────── */
        .team-box {
            margin-top: 16px; padding: 12px;
            border: 1px dashed rgba(76,175,80,.4);
            background: rgba(76,175,80,.05); border-radius: 4px;
        }
        .team-box h4 {
            font-size: 0.7rem; letter-spacing: 2px;
            color: var(--muted); text-transform: uppercase;
            margin-bottom: 8px; font-family: var(--font-mono);
        }
        #op-team-list { font-size: 0.85rem; color: var(--orange); margin-bottom: 10px; line-height: 1.8; }

        /* ── TIMER ─────────────────────────────────────────── */
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .timer-panel h3 { color: var(--orange); font-size: 0.85rem; letter-spacing: 2px; margin-bottom: 10px; }

        .timer-entry {
            background: rgba(255,255,255,.04);
            border: 1px solid var(--border); border-left: 3px solid var(--orange);
            padding: 10px; margin-bottom: 8px; border-radius: 0 4px 4px 0;
            font-size: 0.85rem;
        }
        .countdown {
            font-family: var(--font-mono); font-size: 1.4rem;
            color: var(--red); font-weight: 700;
            background: rgba(0,0,0,.5); padding: 4px 8px;
            display: inline-block; border-radius: 3px; margin-top: 4px;
            letter-spacing: 2px;
        }
        .countdown.expired { color: var(--muted); }

        /* ── RAPPORT ───────────────────────────────────────── */
        .rapport-row { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; }
        .rapport-row:last-child { border-bottom: none; }
        .rapport-key { color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; width: 180px; flex-shrink: 0; text-transform: uppercase; }
        .rapport-val { color: var(--text); font-size: 0.9rem; }

        /* ── CHAT ──────────────────────────────────────────── */
        #chat-window {
            position: fixed; bottom: 20px; right: 20px;
            width: 300px; height: 260px;
            background: var(--bg3);
            border: 1px solid rgba(76,175,80,.4);
            border-radius: 6px; display: flex; flex-direction: column;
            z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,.5);
        }
        #chat-header {
            background: var(--green); color: #000;
            padding: 6px 12px; font-size: 0.7rem;
            font-weight: 700; letter-spacing: 2px;
            font-family: var(--font-mono); border-radius: 5px 5px 0 0;
        }
        #messages {
            flex-grow: 1; overflow-y: auto;
            padding: 10px; font-size: 0.78rem; line-height: 1.6;
            font-family: var(--font-mono);
        }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .msg-time { color: var(--muted); font-size: 0.65rem; margin-right: 6px; }

        .chat-input-area {
            display: flex; padding: 6px; gap: 5px;
            border-top: 1px solid var(--border);
        }
        #chat-input {
            flex-grow: 1; background: transparent; border: none;
            color: white; outline: none; font-family: var(--font-mono);
            font-size: 0.78rem;
        }
        #chat-input::placeholder { color: var(--muted); }
        .chat-send-btn {
            width: auto; padding: 3px 10px; font-size: 0.65rem;
            border-radius: 3px; letter-spacing: 0;
        }

        /* ── ACCUEIL ───────────────────────────────────────── */
        .home-logo {
            font-family: var(--font-mono);
            font-size: 0.55rem; color: var(--green);
            opacity: .3; white-space: pre; line-height: 1.2;
            margin-bottom: 2rem; letter-spacing: 2px;
        }
        #page-accueil { text-align: center; padding-top: 60px; }
        #page-accueil h1 {
            font-family: var(--font-head);
            font-size: 3rem; letter-spacing: 8px; font-weight: 700;
            color: var(--text); margin-bottom: 8px;
        }
        #display-user {
            color: var(--green); font-weight: 400;
            font-size: 0.9rem; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 20px;
            font-family: var(--font-mono);
        }
        #active-mission-alert {
            display: none;
            color: var(--red); font-weight: 700;
            font-family: var(--font-mono); font-size: 0.9rem;
            letter-spacing: 2px; animation: blink 1s infinite;
        }

        /* ── PAGE TITLES ───────────────────────────────────── */
        .page-title {
            color: var(--green); font-size: 1.4rem;
            letter-spacing: 4px; font-weight: 700;
            border-bottom: 1px solid rgba(76,175,80,.3);
            padding-bottom: 10px; margin-bottom: 4px;
            text-transform: uppercase; display: inline-block;
        }

        /* ── TOAST ─────────────────────────────────────────── */
        #toast-container {
            position: fixed; top: 70px; right: 20px;
            z-index: 9999; display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 10px 16px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 0.78rem;
            border-left: 3px solid; letter-spacing: 1px;
            animation: slideIn .25s ease; min-width: 220px;
            box-shadow: 0 4px 12px rgba(0,0,0,.5);
        }
        @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-ok   { background: rgba(76,175,80,.15);  border-color: var(--green);  color: var(--green); }
        .toast-err  { background: rgba(244,67,54,.15);  border-color: var(--red);    color: var(--red); }
        .toast-info { background: rgba(33,150,243,.15); border-color: var(--blue);   color: var(--blue); }
        .toast-warn { background: rgba(255,152,0,.15);  border-color: var(--orange); color: var(--orange); }

        /* ── MODAL ─────────────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.7); z-index: 9998;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-box {
            background: var(--bg4); border: 1px solid var(--border);
            border-top: 2px solid var(--orange);
            padding: 24px; border-radius: 6px; width: 320px;
            font-family: var(--font-mono); font-size: 0.85rem;
            text-align: center;
        }
        .modal-box p { margin-bottom: 20px; color: var(--text); letter-spacing: 1px; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; }

        /* ── PRINT ─────────────────────────────────────────── */
        @media print {
            .navbar, .sidebar, #chat-window, button, .nav-item,
            #toast-container, .modal-overlay { display: none !important; }
            body { background: white; color: black; }
            .op-card { border: 1px solid black; background: white; color: black; }
            .rapport-key { color: #555; }
        }
    </style>
</head>
<body class="logged-out">

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- ── AUTH ──────────────────────────────────── -->
    <div id="auth-section">
        <div class="auth-logo">▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
▓  SGM · SECURE LINK  ▓
▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓</div>
        <h2>IDENTIFICATION</h2>
        <input type="text"     id="username" class="auth-input" placeholder="NOM DE CODE"
               onkeydown="if(event.key==='Enter') register()">
        <input type="password" id="password" class="auth-input" placeholder="CLÉ D'ACCÈS"
               onkeydown="if(event.key==='Enter') register()">
        <button onclick="register()" style="margin-top:8px;">ACTIVER LIAISON</button>
    </div>

    <!-- ── DASHBOARD ─────────────────────────────── -->
    <div id="dashboard">
        <div id="status-banner">⚠ OPÉRATION EN COURS — DÉPLOIEMENT ACTIF ⚠</div>

        <nav class="navbar" id="top-nav">
            <div class="nav-item active" onclick="showPage('accueil',this)">Accueil</div>
            <div class="nav-item" onclick="showPage('operation',this)">Opération</div>
            <div class="nav-item" onclick="showPage('rs',this)">Fiche RS</div>
            <div class="nav-item" onclick="showPage('zd',this)">Fiche ZD</div>
            <div class="nav-item" onclick="showPage('timer',this)">Timers 12h</div>
            <div class="nav-item" onclick="showPage('rapport',this)">Rapport</div>

            <div class="alert-controls">
                <span class="alert-label">ALERTE</span>
                <button class="alert-btn btn-sm btn-l1" onclick="setAlertLevel(1,'BASSE')">L-1</button>
                <button class="alert-btn btn-sm btn-l2" onclick="setAlertLevel(2,'MODÉRÉE')">L-2</button>
                <button class="alert-btn btn-sm btn-l3" onclick="setAlertLevel(3,'CRITIQUE')">L-3</button>
            </div>
        </nav>

        <div class="main-layout">
            <aside class="sidebar">
                <div class="sidebar-title">Unités Connectées</div>
                <ul class="user-list" id="user-list"></ul>
                <button onclick="confirmAction('Réinitialiser la liste des unités ?', clearUsers)"
                        style="margin-top:auto; font-size:0.6rem;" class="btn-muted">
                    Réinitialiser liste
                </button>
            </aside>

            <div class="main-container">

                <!-- ACCUEIL -->
                <div id="page-accueil" class="page" style="display:block;">
                    <div class="home-logo">
 ___  ___  ___  ___
/ __|| __||  _||  _|
\__ \| _| | |_ | |_
|___/|___|`___'`___'
                    </div>
                    <h1>SYSTEM ONLINE</h1>
                    <div id="display-user"></div>
                    <div id="active-mission-alert">⚠ UNE OPÉRATION EST ACTUELLEMENT LANCÉE ⚠</div>
                </div>

                <!-- OPÉRATION -->
                <div id="page-operation" class="page">
                    <h1 class="page-title">Config Mission</h1>
                    <div class="op-card">
                        <h3>Détails Tactiques</h3>
                        <label class="field-label">Nom de l'Opération</label>
                        <input type="text" id="op-name" class="op-input" placeholder="…" oninput="saveMission()">

                        <label class="field-label">Coordonnées GPS</label>
                        <input type="text" id="op-coords" class="op-input" placeholder="48°N 002°E" oninput="saveMission()">

                        <label class="field-label">Objectif Principal</label>
                        <textarea id="op-obj" class="op-input" rows="2" placeholder="…" oninput="saveMission()"></textarea>

                        <div class="team-box">
                            <h4>Unités Engagées</h4>
                            <div id="op-team-list">Aucun personnel inscrit.</div>
                            <button class="btn-sm btn-blue" onclick="joinOperation()">S'INSCRIRE À LA MISSION</button>
                        </div>

                        <div style="margin-top:16px;">
                            <button id="btn-launch" onclick="toggleMission()" class="btn-red">LANCER L'OPÉRATION</button>
                        </div>
                    </div>
                </div>

                <!-- RS -->
                <div id="page-rs" class="page">
                    <h1 class="page-title">Renseignement Cible (RS)</h1>
                    <div class="op-card">
                        <h3>Nouvelle Fiche Individu</h3>
                        <div class="two-col">
                            <div>
                                <label class="field-label">Nom</label>
                                <input type="text" id="rs-name" class="rs-input">
                            </div>
                            <div>
                                <label class="field-label">Grade (1–15)</label>
                                <input type="number" id="rs-danger" class="rs-input" min="1" max="10">
                            </div>
                        </div>
                        <label class="field-label">Signalement / Infos</label>
                        <textarea id="rs-desc" class="rs-input" rows="2"></textarea>

                        <label class="field-label">Photo (URL)</label>
                        <input type="text" id="rs-photo" class="rs-input" placeholder="https://…">

                        <button onclick="addEntry('rs')" style="margin-top:14px;">ARCHIVER DANS LA BASE</button>
                    </div>

                    <div class="history-container">
                        <h3>Historique des Fiches RS</h3>
                        <div id="rs-history-list"></div>
                        <button onclick="confirmAction('Vider tout l\'historique RS ?', ()=>clearHistory('rs'))"
                                class="btn-sm btn-muted">Vider l'historique RS</button>
                    </div>
                </div>

                <!-- ZD -->
                <div id="page-zd" class="page">
                    <h1 class="page-title">Renseignement Cible (ZD)</h1>
                    <div class="op-card">
                        <h3>Nouvelle Fiche Individu</h3>
                        <div class="two-col">
                            <div>
                                <label class="field-label">Nom </label>
                                <input type="text" id="zd-name" class="zd-input">
                            </div>
                            <div>
                                <label class="field-label">Grade (1–16)</label>
                                <input type="number" id="zd-danger" class="zd-input" min="1" max="10">
                            </div>
                        </div>
                        <label class="field-label">Signalement / Infos</label>
                        <textarea id="zd-desc" class="zd-input" rows="2"></textarea>

                        <label class="field-label">Photo ZD (URL)</label>
                        <input type="text" id="zd-photo" class="zd-input" placeholder="https://…">

                        <button onclick="addEntry('zd')" style="margin-top:14px;">ARCHIVER DANS LA BASE ZD</button>
                    </div>

                    <div class="history-container">
                        <h3>Historique des Fiches ZD</h3>
                        <div id="zd-history-list"></div>
                        <button onclick="confirmAction('Vider tout l\'historique ZD ?', ()=>clearHistory('zd'))"
                                class="btn-sm btn-muted">Vider l'historique ZD</button>
                    </div>
                </div>

                <!-- TIMER -->
                <div id="page-timer" class="page">
                    <h1 class="page-title">Comptes à rebours tactiques (12H)</h1>
                    <div class="timer-grid">
                        <div class="timer-panel">
                            <h3>Décomptes RS</h3>
                            <div id="rs-timer-list"></div>
                        </div>
                        <div class="timer-panel">
                            <h3>Décomptes ZD</h3>
                            <div id="zd-timer-list"></div>
                        </div>
                    </div>
                </div>

                <!-- RAPPORT -->
                <div id="page-rapport" class="page">
                    <h1 class="page-title">Rapport de Mission Finale</h1>
                    <div class="op-card" id="rapport-content">
                        <div id="rapport-vide" style="text-align:center; padding:20px;">
                            <p style="color:var(--muted); font-family:var(--font-mono); font-size:0.85rem;">
                                ⚠ AUCUNE DONNÉE — Lancez et terminez une opération.
                            </p>
                        </div>
                        <div id="rapport-details" style="display:none;">
                            <h2 style="font-size:1rem; letter-spacing:3px; margin-bottom:16px; color:var(--green); font-family:var(--font-mono);">
                                SYNTHÈSE TACTIQUE
                            </h2>
                            <div id="rapport-data"></div>
                            <div style="margin-top:20px;">
                                <button onclick="window.print()" class="btn-sm btn-blue" style="padding:8px 20px;">
                                    IMPRIMER / EXPORTER PDF
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- /main-container -->
        </div><!-- /main-layout -->

        <!-- CHAT -->
        <div id="chat-window">
            <div id="chat-header">▶ SECURE CHANNEL</div>
            <div id="messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Transmission…"
                       onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="chat-send-btn" onclick="sendMessage()">▶</button>
            </div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════
    //  UTILITAIRES
    // ═══════════════════════════════════════════════════════════

    /** Échappe le HTML pour éviter les injections XSS */
    function esc(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    /** Heure courante formatée HH:MM */
    function nowTime() {
        return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    // ── Toast notifications ──────────────────────────────────
    function toast(msg, type = 'ok', duration = 3000) {
        const el = document.createElement('div');
        el.className = `toast toast-${type}`;
        el.textContent = msg;
        const c = document.getElementById('toast-container');
        c.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, duration);
    }

    // ── Modal de confirmation ────────────────────────────────
    function confirmAction(msg, callback) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal-box">
                <p>${esc(msg)}</p>
                <div class="modal-actions">
                    <button class="btn-muted" id="modal-no">ANNULER</button>
                    <button class="btn-red"   id="modal-yes">CONFIRMER</button>
                </div>
            </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('#modal-no').onclick  = () => overlay.remove();
        overlay.querySelector('#modal-yes').onclick = () => { overlay.remove(); callback(); };
    }

    // ── Badge dangerosité ────────────────────────────────────
    function dangerBadge(val) {
        const n = parseInt(val) || 0;
        const cls = n >= 8 ? 'danger-high' : n >= 5 ? 'danger-medium' : 'danger-low';
        return `<span class="danger-badge ${cls}">${esc(val) || '?'}/10</span>`;
    }

    // ═══════════════════════════════════════════════════════════
    //  ÉTAT
    // ═══════════════════════════════════════════════════════════
    let missionActive = false;
    let currentTeam   = [];

    window.onload = function () {
        updateUserList();
        loadMission();
        loadEntries('rs');
        loadEntries('zd');
        setInterval(updateAllTimers, 1000);
    };

    // ═══════════════════════════════════════════════════════════
    //  AUTH
    // ═══════════════════════════════════════════════════════════
    function register() {
        const userField = document.getElementById('username');
        const user = userField.value.trim();
        if (!user) { toast('Identifiant requis.', 'err'); return; }

        let users = JSON.parse(localStorage.getItem('military_users')) || [];
        if (!users.includes(user)) {
            users.push(user);
            localStorage.setItem('military_users', JSON.stringify(users));
        }
        document.getElementById('display-user').textContent = 'OPÉRATEUR : ' + user;
        updateUserList();
        document.body.className = 'logged-in';
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        toast('Liaison sécurisée établie.', 'ok');
    }

    // ═══════════════════════════════════════════════════════════
    //  NAVIGATION
    // ═══════════════════════════════════════════════════════════
    function showPage(pageId, navEl) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-' + pageId).style.display = 'block';

        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if (navEl) navEl.classList.add('active');

        if (pageId === 'rapport') updateRapport();
        if (pageId === 'timer')   updateAllTimers();

        document.getElementById('chat-window').style.display =
            (pageId === 'accueil') ? 'flex' : 'none';
    }

    // ═══════════════════════════════════════════════════════════
    //  ALERTE
    // ═══════════════════════════════════════════════════════════
    function setAlertLevel(level, label) {
        const colorMap = { 1: 'var(--green)', 2: 'var(--orange)', 3: 'var(--red)' };
        const color = colorMap[level] || 'var(--green)';
        document.getElementById('top-nav').style.borderBottomColor = color;
        chatSystem(`[ALERT] Niveau ${esc(label)} activé par ${esc(currentUser())}.`, color);
        toast(`Alerte ${label} activée.`, level === 3 ? 'err' : level === 2 ? 'warn' : 'ok');
    }

    // ═══════════════════════════════════════════════════════════
    //  MISSION
    // ═══════════════════════════════════════════════════════════
    function toggleMission() {
        const opName = document.getElementById('op-name').value;
        if (!opName && !missionActive) { toast('Nom d\'opération requis.', 'err'); return; }

        missionActive = !missionActive;
        const user = currentUser();

        if (!missionActive) {
            currentTeam = [];
            updateTeamUI();
            chatSystem(`${esc(user)} A TERMINÉ L'OPÉRATION. Unités démobilisées.`, 'var(--orange)');
        } else {
            chatSystem(`${esc(user)} A LANCÉ L'OPÉRATION : ${esc(opName)}`, 'var(--red)');
        }
        updateUIMissionState();
        saveMission();
    }

    function updateUIMissionState() {
        document.getElementById('status-banner').style.display = missionActive ? 'block' : 'none';
        document.getElementById('active-mission-alert').style.display = missionActive ? 'block' : 'none';
        const btn = document.getElementById('btn-launch');
        btn.textContent = missionActive ? 'TERMINER L\'OPÉRATION' : 'LANCER L\'OPÉRATION';
        btn.className   = missionActive ? 'btn-muted' : 'btn-red';
    }

    function saveMission() {
        localStorage.setItem('current_mission', JSON.stringify({
            name:     document.getElementById('op-name').value,
            coords:   document.getElementById('op-coords').value,
            obj:      document.getElementById('op-obj').value,
            team:     currentTeam,
            isActive: missionActive
        }));
    }

    function loadMission() {
        const saved = JSON.parse(localStorage.getItem('current_mission'));
        if (!saved) return;
        document.getElementById('op-name').value   = saved.name   || '';
        document.getElementById('op-coords').value = saved.coords || '';
        document.getElementById('op-obj').value    = saved.obj    || '';
        currentTeam   = saved.team     || [];
        missionActive = saved.isActive || false;
        updateUIMissionState();
        updateTeamUI();
    }

    function joinOperation() {
        const user = currentUser();
        if (currentTeam.includes(user)) { toast('Déjà inscrit à la mission.', 'warn'); return; }
        currentTeam.push(user);
        updateTeamUI();
        saveMission();
        chatSystem(`${esc(user)} a rejoint la mission.`, 'var(--blue)');
        toast('Inscription enregistrée.', 'ok');
    }

    function updateTeamUI() {
        const list = document.getElementById('op-team-list');
        list.innerHTML = currentTeam.length === 0
            ? 'Aucun personnel inscrit.'
            : currentTeam.map(u => `▸ ${esc(u)}`).join('<br>');
    }

    // ═══════════════════════════════════════════════════════════
    //  FICHES RS / ZD  (fonctions génériques)
    // ═══════════════════════════════════════════════════════════
    function addEntry(type) {
        const nameEl = document.getElementById(`${type}-name`);
        const name   = nameEl.value.trim();
        if (!name) { toast('Le nom est requis.', 'err'); return; }

        const oldTime      = nameEl.dataset.originalTimestamp;
        const finalTimestamp = oldTime ? parseInt(oldTime) : Date.now();

        const entry = {
            name,
            danger:    document.getElementById(`${type}-danger`).value,
            desc:      document.getElementById(`${type}-desc`).value,
            photo:     document.getElementById(`${type}-photo`).value,
            timestamp: finalTimestamp,
            date:      new Date(finalTimestamp).toLocaleString('fr-FR')
        };

        const key     = `${type}_history`;
        const history = JSON.parse(localStorage.getItem(key)) || [];
        history.unshift(entry);
        localStorage.setItem(key, JSON.stringify(history));

        // Reset form
        document.querySelectorAll(`.${type}-input`).forEach(i => i.value = '');
        delete nameEl.dataset.originalTimestamp;

        loadEntries(type);
        toast(`Fiche ${type.toUpperCase()} archivée.`, 'ok');
    }

    function loadEntries(type) {
        const list    = document.getElementById(`${type}-history-list`);
        const history = JSON.parse(localStorage.getItem(`${type}_history`)) || [];
        const label   = type === 'rs' ? 'CIBLE' : 'ZONE';

        list.innerHTML = history.length === 0
            ? `<p style="color:var(--muted); font-family:var(--font-mono); font-size:0.8rem;">Aucune fiche.</p>`
            : history.map((item, index) => `
                <div class="entry-card">
                    <div class="entry-header">
                        <span class="entry-name">${esc(label)} : ${esc(item.name)}</span>
                        <button class="btn-sm btn-blue"
                            onclick="editEntry('${type}', ${index})">MODIFIER</button>
                    </div>
                    <div class="entry-body">
                        ${item.photo ? `<img src="${esc(item.photo)}" class="entry-photo" onerror="this.style.display='none'" alt="">` : ''}
                        <div>
                            <div>Dangerosité : ${dangerBadge(item.danger)}</div>
                            <div class="entry-desc">"${esc(item.desc) || '…'}"</div>
                            <div style="color:var(--muted); font-size:0.7rem; margin-top:6px; font-family:var(--font-mono);">${esc(item.date)}</div>
                        </div>
                    </div>
                </div>`).join('');
    }

    function editEntry(type, index) {
        const key     = `${type}_history`;
        const history = JSON.parse(localStorage.getItem(key)) || [];
        const item    = history[index];
        if (!item) return;

        const nameEl = document.getElementById(`${type}-name`);
        nameEl.value                      = item.name;
        document.getElementById(`${type}-danger`).value = item.danger;
        document.getElementById(`${type}-desc`).value   = item.desc;
        document.getElementById(`${type}-photo`).value  = item.photo || '';
        nameEl.dataset.originalTimestamp = item.timestamp;

        history.splice(index, 1);
        localStorage.setItem(key, JSON.stringify(history));
        loadEntries(type);
        toast('Données remontées — timer d\'origine conservé.', 'info');
        document.querySelector('.main-container').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearHistory(type) {
        localStorage.removeItem(`${type}_history`);
        loadEntries(type);
        toast(`Historique ${type.toUpperCase()} vidé.`, 'warn');
    }

    // ═══════════════════════════════════════════════════════════
    //  TIMERS
    // ═══════════════════════════════════════════════════════════
    function updateAllTimers() {
        const now   = Date.now();
        const LIMIT = 12 * 60 * 60 * 1000;

        ['rs', 'zd'].forEach(type => {
            const list = document.getElementById(`${type}-timer-list`);
            if (!list) return;
            const history = JSON.parse(localStorage.getItem(`${type}_history`)) || [];

            list.innerHTML = history.length === 0
                ? '<p style="color:var(--muted); font-family:var(--font-mono); font-size:0.8rem;">Aucun décompte.</p>'
                : history.map(item => {
                    const left = (item.timestamp + LIMIT) - now;
                    let text = 'EXPIRÉ', cls = 'expired';
                    if (left > 0) {
                        const h = Math.floor(left / 3600000);
                        const m = Math.floor((left % 3600000) / 60000);
                        const s = Math.floor((left % 60000) / 1000);
                        text = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                        cls  = '';
                    }
                    return `<div class="timer-entry">
                        <b>${esc(item.name)}</b>
                        <br><span class="countdown ${cls}">${text}</span>
                    </div>`;
                }).join('');
        });
    }

    // ═══════════════════════════════════════════════════════════
    //  RAPPORT
    // ═══════════════════════════════════════════════════════════
    function updateRapport() {
        const saved = JSON.parse(localStorage.getItem('current_mission'));
        if (saved && saved.name && !saved.isActive) {
            document.getElementById('rapport-vide').style.display = 'none';
            document.getElementById('rapport-details').style.display = 'block';

            const rsCount = (JSON.parse(localStorage.getItem('rs_history')) || []).length;
            const zdCount = (JSON.parse(localStorage.getItem('zd_history')) || []).length;

            document.getElementById('rapport-data').innerHTML = [
                ['Opération',          esc(saved.name)],
                ['Coordonnées GPS',    esc(saved.coords) || 'N/A'],
                ['Objectif',           esc(saved.obj) || 'N/A'],
                ['Statut',             '<span style="color:var(--green)">MISSION ACCOMPLIE</span>'],
                ['Unités engagées',    saved.team.length ? saved.team.map(esc).join(', ') : 'Démobilisées'],
                ['Fiches RS archivées',`${rsCount}`],
                ['Fiches ZD archivées',`${zdCount}`],
            ].map(([k,v]) => `<div class="rapport-row"><span class="rapport-key">${k}</span><span class="rapport-val">${v}</span></div>`).join('');
        } else {
            document.getElementById('rapport-vide').style.display = 'block';
            document.getElementById('rapport-details').style.display = 'none';
        }
    }

    // ═══════════════════════════════════════════════════════════
    //  SIDEBAR — UTILISATEURS
    // ═══════════════════════════════════════════════════════════
    function updateUserList() {
        const list  = document.getElementById('user-list');
        if (!list) return;
        const users = JSON.parse(localStorage.getItem('military_users')) || [];
        list.innerHTML = users.length === 0
            ? '<li style="color:var(--muted); font-size:0.75rem; padding:8px; font-family:var(--font-mono);">Aucune unité.</li>'
            : users.map(u => `<li class="user-item"><div class="status-dot"></div><span>${esc(u)}</span></li>`).join('');
    }

    function clearUsers() {
        localStorage.removeItem('military_users');
        updateUserList();
        toast('Liste des unités réinitialisée.', 'warn');
    }

    // ═══════════════════════════════════════════════════════════
    //  CHAT
    // ═══════════════════════════════════════════════════════════
    function sendMessage() {
        const input  = document.getElementById('chat-input');
        const msg    = input.value.trim();
        const user   = currentUser();
        if (!msg) return;

        appendChat(`<span class="msg-time">${nowTime()}</span><b style="color:var(--green)">${esc(user)} :</b> ${esc(msg)}`);
        input.value = '';
    }

    function chatSystem(msg, color = 'var(--orange)') {
        appendChat(`<span class="msg-time">${nowTime()}</span><b style="color:${color}">[SYS]</b> ${msg}`);
    }

    function appendChat(html) {
        const area = document.getElementById('messages');
        const div  = document.createElement('div');
        div.innerHTML = html;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    // ═══════════════════════════════════════════════════════════
    //  HELPERS
    // ═══════════════════════════════════════════════════════════
    function currentUser() {
        return document.getElementById('username').value.trim() || 'UNITÉ-X';
    }
    </script>
</body>
</html>
